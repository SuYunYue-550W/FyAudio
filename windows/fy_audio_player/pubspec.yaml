name: fy_audio_player
description: FyAudio - 多终端WiFi蓝牙同步音频播放系统
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1

  window_manager: ^0.3.7

  shared_preferences: ^2.2.2

  permission_handler: ^11.1.0

  device_info_plus: ^9.1.1

  uuid: ^4.2.1

  flutter_blue_plus: ^1.31.4

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Microsoft YaHei
      fonts:
        - asset: assets/fonts/msyh.ttc
