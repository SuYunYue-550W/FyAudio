name: fy_audio_player
description: FyAudio - 多终端WiFi蓝牙同步音频播放系统
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1

  system_tray: ^2.0.3

  window_manager: ^0.3.7

  shared_preferences: ^2.2.2

  permission_handler: ^11.1.0

  device_info_plus: ^9.1.1

  uuid: ^3.0.7

  json_annotation: ^4.8.1

  logger: ^2.0.2+1

  flutter_hooks: ^0.18.6

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Microsoft YaHei
      fonts:
        - asset: assets/fonts/msyh.ttc