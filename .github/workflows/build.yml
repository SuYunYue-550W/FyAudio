name: FyAudio Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go vet
        run: |
          cd common
          go vet ./...

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Flutter analyze
        working-directory: windows/fy_audio_player
        run: flutter analyze

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go unit tests
        run: |
          cd common
          go test ./protocol/... ./sync/... ./network/... -v -race

      - name: Run Go integration tests
        run: |
          cd common
          go test ./... -v -run Integration

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: windows/fy_audio_player
        run: flutter pub get

      - name: Run Flutter widget tests
        working-directory: windows/fy_audio_player
        run: flutter test test/widget_test.dart

      - name: Run Flutter integration tests
        working-directory: windows/fy_audio_player
        run: flutter test integration_test/app_test.dart 2>&1 || true

  build-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go backend
        run: |
          cd common
          GOOS=linux GOARCH=amd64 go build -o fyaudio_backend_linux .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libbluetooth-dev

      - name: Get dependencies
        working-directory: windows/fy_audio_player
        run: flutter pub get

      - name: Build Linux release
        working-directory: windows/fy_audio_player
        run: flutter build linux --release

      - name: Prepare release
        run: |
          mkdir -p releases/linux
          cp -r windows/fy_audio_player/build/linux/x64/release/bundle/* releases/linux/
          cp common/fyaudio_backend_linux releases/linux/
          cd releases
          zip -r fyaudio_linux.zip linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fyaudio_linux
          path: releases/fyaudio_linux.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: releases/fyaudio_linux.zip

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go backend
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          cd common
          go build -o fyaudio_backend.exe .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Get dependencies
        working-directory: windows/fy_audio_player
        run: flutter pub get

      - name: Build Windows release
        id: build_windows
        working-directory: windows/fy_audio_player
        continue-on-error: true
        run: flutter build windows --release

      - name: Prepare Windows release
        if: steps.build_windows.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path releases/windows
          Copy-Item windows/fy_audio_player/build/windows/x64/runner/Release/fy_audio_player.exe releases/windows/
          Copy-Item windows/fy_audio_player/build/windows/x64/runner/Release/flutter_windows.dll releases/windows/
          Copy-Item windows/fy_audio_player/build/windows/x64/runner/Release/*.dll releases/windows/
          Copy-Item windows/fy_audio_player/build/windows/x64/runner/Release/data releases/windows/data -Recurse
          Copy-Item common/fyaudio_backend.exe releases/windows/
          Compress-Archive -Path releases/windows/* -DestinationPath releases/fyaudio_windows.zip

      - name: Upload Windows artifact
        if: steps.build_windows.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: fyaudio_windows
          path: releases/fyaudio_windows.zip

      - name: Upload Windows to Release
        if: github.event_name == 'release' && steps.build_windows.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: releases/fyaudio_windows.zip

  build-android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Get dependencies
        working-directory: windows/fy_audio_player
        run: flutter pub get

      - name: Build Android release
        id: build_android
        working-directory: windows/fy_audio_player
        continue-on-error: true
        run: flutter build apk --release

      - name: Prepare Android release
        if: steps.build_android.outcome == 'success'
        run: |
          mkdir -p releases/android
          cp windows/fy_audio_player/build/app/outputs/apk/release/app-release.apk releases/android/fyaudio.apk

      - name: Upload Android artifact
        if: steps.build_android.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: fyaudio_android
          path: releases/android/fyaudio.apk

      - name: Upload Android to Release
        if: github.event_name == 'release' && steps.build_android.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: releases/android/fyaudio.apk

  build-raspberrypi:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf libasound2-dev

      - name: Build Raspberry Pi backend
        run: |
          cd raspberrypi/gateway
          GOOS=linux GOARCH=arm GOARM=7 CC=arm-linux-gnueabihf-gcc go build -o fyaudio_gateway_arm .

      - name: Prepare Raspberry Pi release
        run: |
          mkdir -p releases/raspberrypi
          cp raspberrypi/gateway/fyaudio_gateway_arm releases/raspberrypi/
          cp raspberrypi/gateway/install.sh releases/raspberrypi/
          cp raspberrypi/gateway/fyaudio-gateway.service releases/raspberrypi/
          cd releases
          zip -r fyaudio_raspberrypi.zip raspberrypi/

      - name: Upload Raspberry Pi artifact
        uses: actions/upload-artifact@v4
        with:
          name: fyaudio_raspberrypi
          path: releases/fyaudio_raspberrypi.zip

      - name: Upload Raspberry Pi to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: releases/fyaudio_raspberrypi.zip